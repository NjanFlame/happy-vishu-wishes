<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishuashanam - Create Your Blessed Wish</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --royal-purple: #4A0E4E;
            --deep-burgundy: #6B1A4A;
            --gold: #D4AF37;
            --gold-light: #F4D03F;
            --champagne: #F7E7CE;
            --midnight-blue: #0D1B2A;
            --dark-slate: #1B263B;
            --ivory: #FFFFF0;
            --rose-gold: #E8B4B8;
            --text-light: #F8F8FF;
            --accent-coral: #E85A4F;
        }

        /* Floating Elements Background */
        .floating-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .decor-element {
            position: absolute;
            opacity: 0.12;
            animation: floatAround 18s ease-in-out infinite;
        }

        .decor-ornament {
            width: 80px;
            height: 80px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            background: radial-gradient(circle, transparent 30%, var(--gold) 50%, transparent 70%);
        }

        @keyframes floatAround {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-40px) rotate(90deg); }
            50% { transform: translateY(0) rotate(180deg); }
            75% { transform: translateY(40px) rotate(270deg); }
        }

        /* Main Container */
        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, var(--midnight-blue) 0%, var(--dark-slate) 50%, var(--royal-purple) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: var(--text-light);
        }

        /* Background Pattern */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                linear-gradient(45deg, transparent 48%, rgba(212, 175, 55, 0.02) 49%, rgba(212, 175, 55, 0.02) 51%, transparent 52%);
            background-size: 100% 100%, 100% 100%, 50px 50px;
            z-index: 0;
        }

        /* Creator View */
        .creator-view {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        /* Decorative Border */
        .decorative-border {
            position: fixed;
            top: 25px;
            left: 25px;
            right: 25px;
            bottom: 25px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            pointer-events: none;
            z-index: 0;
        }

        .corner-ornament {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.6;
        }

        .corner-tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .corner-tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, transparent 70%);
            z-index: -1;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(32px, 7vw, 64px);
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 
                0 0 40px rgba(212, 175, 55, 0.5),
                0 0 80px rgba(212, 175, 55, 0.25),
                3px 3px 0 rgba(0, 0, 0, 0.4);
            animation: titleGlow 3s ease-in-out infinite;
            line-height: 1.3;
        }

        .header .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(11px, 2vw, 16px);
            color: var(--champagne);
            margin-top: 18px;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.75;
        }

        .header .divider {
            width: 150px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 25px auto 0;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 40px rgba(212, 175, 55, 0.5), 0 0 80px rgba(212, 175, 55, 0.25); }
            50% { text-shadow: 0 0 50px rgba(212, 175, 55, 0.7), 0 0 100px rgba(212, 175, 55, 0.4); }
        }

        /* Form Card */
        .form-card {
            background: linear-gradient(145deg, rgba(27, 38, 59, 0.92), rgba(13, 27, 42, 0.96));
            border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 3px;
            padding: clamp(28px, 5vw, 55px);
            width: 100%;
            max-width: 540px;
            box-shadow: 
                0 35px 90px rgba(0, 0, 0, 0.65),
                0 0 50px rgba(212, 175, 55, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .form-card::after {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: linear-gradient(45deg, transparent 40%, rgba(212, 175, 55, 0.015) 50%, transparent 60%);
            animation: shimmer 5s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .input-group label {
            display: block;
            color: var(--gold);
            font-size: 10px;
            margin-bottom: 14px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 18px 22px;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 2px;
            color: var(--text-light);
            transition: all 0.45s ease;
            outline: none;
            letter-spacing: 1px;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.12), inset 0 0 25px rgba(212, 175, 55, 0.03);
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-style: italic;
        }

        .input-group textarea {
            min-height: 95px;
            resize: vertical;
        }

        /* Image Upload */
        .image-upload-area {
            border: 2px dashed rgba(212, 175, 55, 0.25);
            border-radius: 3px;
            padding: 35px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s ease;
            background: rgba(0, 0, 0, 0.18);
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .image-upload-area:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.04);
        }

        .image-upload-area.dragover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
        }

        .image-upload-area.has-image {
            padding: 15px;
            border-style: solid;
            border-color: var(--gold);
        }

        .upload-icon {
            font-size: 42px;
            color: var(--gold);
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .upload-text {
            font-size: 12px;
            color: var(--champagne);
            opacity: 0.6;
        }

        .upload-preview {
            max-width: 100%;
            max-height: 160px;
            border-radius: 2px;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .image-upload-area.has-image .upload-preview {
            display: block;
            margin: 0 auto;
        }

        .image-upload-area.has-image .upload-icon,
        .image-upload-area.has-image .upload-text {
            display: none;
        }

        .remove-image {
            display: none;
            margin-top: 10px;
            font-size: 10px;
            color: var(--accent-coral);
            cursor: pointer;
            text-decoration: underline;
            letter-spacing: 1px;
        }

        .image-upload-area.has-image .remove-image {
            display: block;
        }

        #imageInput {
            display: none;
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 22px 45px;
            font-family: 'Cinzel', serif;
            font-size: clamp(15px, 2.8vw, 18px);
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(145deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 2px;
            color: var(--midnight-blue);
            cursor: pointer;
            transition: all 0.45s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 10px 30px rgba(212, 175, 55, 0.35),
                0 0 0 0 rgba(212, 175, 55, 0.55);
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(212, 175, 55, 0.45),
                0 0 0 4px rgba(212, 175, 55, 0.55);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: 0.7s;
        }

        .generate-btn:hover::before {
            left: 100%;
        }

        /* Result Section */
        .result-section {
            display: none;
            margin-top: 35px;
            padding: 22px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .result-section.show {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section label {
            color: var(--gold);
            font-size: 9px;
            display: block;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .result-link {
            word-break: break-all;
            color: var(--champagne);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.35);
            padding: 16px;
            border-radius: 2px;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .copy-btn {
            padding: 14px 28px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 2px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.35s ease;
        }

        .copy-btn:hover {
            background: var(--gold);
            color: var(--midnight-blue);
        }

        /* Footer Branding */
        .footer-branding {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(212, 175, 55, 0.45);
            letter-spacing: 3px;
            z-index: 100;
        }

        /* ==================== ANIMATION VIEW ==================== */

        .animation-view {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--midnight-blue) 0%, var(--dark-slate) 50%, var(--royal-purple) 100%);
            position: relative;
            overflow: hidden;
        }

        .animation-view.active {
            display: block;
        }

        /* Celebration Canvas */
        .celebration-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Decorative Lamps */
        .lamp-container {
            position: fixed;
            bottom: 7%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: flex-end;
            gap: 25px;
        }

        .lamp {
            width: 55px;
            height: 90px;
            position: relative;
        }

        .lamp-body {
            width: 55px;
            height: 45px;
            background: linear-gradient(to bottom, #8B4513, #5D2E0C);
            border-radius: 0 0 50% 50%;
            position: absolute;
            bottom: 0;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.55);
        }

        .lamp-flame {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 28px;
            background: linear-gradient(to top, var(--gold), #FF6B35, transparent);
            border-radius: 50% 50% 20% 20%;
            animation: flameFlicker 0.35s ease-in-out infinite alternate;
            filter: blur(1px);
        }

        .lamp-glow {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 40px;
            background: radial-gradient(ellipse at center, rgba(255, 200, 100, 0.55), transparent);
            border-radius: 50%;
            animation: glowPulse 0.35s ease-in-out infinite alternate;
        }

        .lamp::before {
            content: '';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 18px;
            background: linear-gradient(to top, #8B4513, #5D2E0C);
        }

        @keyframes flameFlicker {
            0% { transform: translateX(-50%) scaleY(1) scaleX(1) rotate(-2.5deg); }
            100% { transform: translateX(-50%) scaleY(1.18) scaleX(0.88) rotate(2.5deg); }
        }

        @keyframes glowPulse {
            0% { opacity: 0.65; transform: translateX(-50%) scale(1); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.25); }
        }

        /* User Image Display */
        .user-image-display {
            width: clamp(110px, 28vw, 200px);
            height: clamp(110px, 28vw, 200px);
            border-radius: 50%;
            border: 4px solid var(--gold);
            margin: 0 auto 35px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.45);
            opacity: 0;
            animation: fadeIn 1s ease-out 0.25s forwards;
            background: var(--deep-burgundy);
        }

        .user-image-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Name Display */
        .name-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 90%;
            padding-top: 60px;
        }

        .name-display h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(38px, 11vw, 95px);
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 8px;
            text-shadow: 
                0 0 40px rgba(212, 175, 55, 0.85),
                0 0 80px rgba(212, 175, 55, 0.5),
                0 0 120px rgba(212, 175, 55, 0.3),
                4px 4px 0 rgba(0, 0, 0, 0.35);
            opacity: 0;
            animation: grandNameReveal 2.8s ease-out 0.4s forwards;
            line-height: 1.15;
            text-transform: capitalize;
        }

        @keyframes grandNameReveal {
            0% { 
                opacity: 0; 
                transform: scale(0.25) translateY(100px);
                filter: blur(35px);
                letter-spacing: 25px;
            }
            40% {
                opacity: 1;
                transform: scale(1.18) translateY(0);
                filter: blur(0);
                letter-spacing: 8px;
            }
            70% {
                transform: scale(0.93) translateY(0);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateY(0);
                letter-spacing: 8px;
            }
        }

        /* Wish Message */
        .wish-message {
            font-family: 'Playfair Display', serif;
            font-size: clamp(15px, 3.2vw, 22px);
            color: var(--champagne);
            margin-top: 45px;
            padding: 0 25px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.2s forwards;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.55);
            font-style: italic;
            line-height: 1.65;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Banner Text */
        .banner-text {
            font-family: 'Cinzel', serif;
            font-size: clamp(22px, 5.5vw, 44px);
            color: var(--rose-gold);
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.08s forwards;
            text-shadow: 0 0 25px rgba(232, 180, 184, 0.55);
            letter-spacing: 5px;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 7px;
            height: 7px;
            background: var(--gold);
            z-index: 15;
            pointer-events: none;
            animation: grandConfettiFall 4s ease-in forwards;
        }

        @keyframes grandConfettiFall {
            0% { 
                transform: translateY(-110vh) rotate(0deg); 
                opacity: 1;
            }
            100% { 
                transform: translateY(110vh) rotate(1260deg); 
                opacity: 0;
            }
        }

        /* Sparkles */
        .sparkle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--gold-light);
            border-radius: 50%;
            z-index: 12;
            pointer-events: none;
            animation: sparkleOut 1.5s ease-out forwards;
            box-shadow: 0 0 8px var(--gold);
        }

        @keyframes sparkleOut {
            0% { 
                transform: scale(0); 
                opacity: 1;
            }
            40% { 
                transform: scale(1.8); 
                opacity: 1;
            }
            100% { 
                transform: scale(0); 
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 620px) {
            .form-card {
                padding: 28px 22px;
            }

            .input-group input,
            .input-group textarea {
                padding: 16px 18px;
                font-size: 15px;
            }

            .header h1 {
                letter-spacing: 5px;
            }

            .header .subtitle {
                letter-spacing: 4px;
            }

            .header .divider {
                width: 100px;
            }

            .lamp {
                transform: scale(0.75);
            }

            .lamp-container {
                gap: 15px;
                bottom: 5%;
            }
        }

        @media (max-width: 420px) {
            .decorative-border {
                top: 12px;
                left: 12px;
                right: 12px;
                bottom: 12px;
            }

            .corner-ornament {
                width: 25px;
                height: 25px;
            }

            .lamp-container {
                transform: translateX(-50%) scale(0.6);
                bottom: 3%;
            }

            .header h1 {
                letter-spacing: 3px;
            }

            .header .divider {
                width: 70px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Decorations Background -->
    <div class="floating-decorations" id="decorationsContainer"></div>
    <div class="bg-pattern"></div>

    <!-- Decorative Border -->
    <div class="decorative-border">
        <div class="corner-ornament corner-tl"></div>
        <div class="corner-ornament corner-tr"></div>
        <div class="corner-ornament corner-bl"></div>
        <div class="corner-ornament corner-br"></div>
    </div>

    <!-- CREATOR VIEW -->
    <div class="creator-view" id="creatorView">
        <header class="header">
            <h1>Vishuashanam</h1>
            <p class="subtitle">Create Your Blessed Wish</p>
            <div class="divider"></div>
        </header>

        <div class="form-card">
            <div class="input-group">
                <label>Recipient Name</label>
                <input type="text" id="recipientName" placeholder="Enter the blessed name..." autocomplete="off">
            </div>

            <div class="input-group">
                <label>Your Name (Sender)</label>
                <input type="text" id="senderName" placeholder="Enter your name..." autocomplete="off">
            </div>

            <div class="input-group">
                <label>Your Blessing Message</label>
                <textarea id="customWish" placeholder="Write your personalized wish of blessing..."></textarea>
            </div>

            <!-- Image Upload -->
            <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                <div class="upload-icon">✦</div>
                <div class="upload-text">Add Your Photo (Optional)</div>
                <img class="upload-preview" id="uploadPreview" alt="Preview">
                <span class="remove-image" id="removeImage">Remove Photo</span>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <button class="generate-btn" onclick="generateLink()">
                ⋆ Generate Blessing Link ⋆
            </button>

            <div class="result-section" id="resultSection">
                <label>Share this blessing link</label>
                <div class="result-link" id="resultLink"></div>
                <button class="copy-btn" onclick="copyLink()">Copy Link</button>
            </div>
        </div>
    </div>

    <!-- ANIMATION VIEW -->
    <div class="animation-view" id="animationView">
        <canvas class="celebration-canvas" id="celebrationCanvas"></canvas>
        
        <div class="lamp-container">
            <div class="lamp">
                <div class="lamp-glow"></div>
                <div class="lamp-flame"></div>
                <div class="lamp-body"></div>
            </div>
        </div>

        <div class="name-display">
            <p class="banner-text">Vishuashanam</p>
            <div class="user-image-display" id="userImageDisplay">
                <img id="displayImage" alt="User">
            </div>
            <h1 id="displayName"></h1>
            <p class="wish-message" id="displayWish"></p>
        </div>
    </div>

    <!-- Footer Branding -->
    <div class="footer-branding">Made by NjanFlame</div>

    <script>
        // Image handling
        let userImageData = null;

        // Image upload handling
        const imageInput = document.getElementById('imageInput');
        const imageUploadArea = document.getElementById('imageUploadArea');
        const uploadPreview = document.getElementById('uploadPreview');
        const removeImage = document.getElementById('removeImage');

        imageInput.addEventListener('change', handleImageSelect);

        imageUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageUploadArea.classList.add('dragover');
        });

        imageUploadArea.addEventListener('dragleave', () => {
            imageUploadArea.classList.remove('dragover');
        });

        imageUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            imageUploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processImage(file);
            }
        });

        removeImage.addEventListener('click', (e) => {
            e.stopPropagation();
            removeUserImage();
        });

        function handleImageSelect(e) {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                processImage(file);
            }
        }

        function processImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                userImageData = e.target.result;
                uploadPreview.src = userImageData;
                imageUploadArea.classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        function removeUserImage() {
            userImageData = null;
            imageInput.value = '';
            uploadPreview.src = '';
            imageUploadArea.classList.remove('has-image');
        }

        // Check URL parameters on load
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            const wish = urlParams.get('wish');
            const img = urlParams.get('img');
            const from = urlParams.get('from');

            if (name) {
                showAnimation(name, wish, img, from);
            } else {
                createFloatingDecorations();
            }
        });

        // Create floating decorations background
        function createFloatingDecorations() {
            const container = document.getElementById('decorationsContainer');
            for (let i = 0; i < 12; i++) {
                const decor = document.createElement('div');
                decor.className = 'decor-element decor-ornament';
                decor.style.left = Math.random() * 100 + '%';
                decor.style.top = Math.random() * 100 + '%';
                decor.style.animationDelay = Math.random() * 8 + 's';
                decor.style.animationDuration = (8 + Math.random() * 8) + 's';
                decor.style.transform = `scale(${0.4 + Math.random() * 0.5})`;
                container.appendChild(decor);
            }
        }

        // Generate shareable link
        function generateLink() {
            const nameInput = document.getElementById('recipientName');
            const senderInput = document.getElementById('senderName');
            const wishInput = document.getElementById('customWish');
            const resultSection = document.getElementById('resultSection');
            const resultLink = document.getElementById('resultLink');

            const name = nameInput.value.trim();
            const sender = senderInput.value.trim();
            
            if (!name) {
                nameInput.focus();
                nameInput.style.borderColor = 'rgba(232, 90, 79, 0.8)';
                setTimeout(() => {
                    nameInput.style.borderColor = '';
                }, 2500);
                return;
            }

            // Encode parameters
            const encodedName = encodeURIComponent(btoa(encodeURIComponent(name)));
            const encodedSender = sender ? encodeURIComponent(btoa(encodeURIComponent(sender))) : '';
            const encodedWish = wishInput.value.trim() ? encodeURIComponent(btoa(encodeURIComponent(wishInput.value.trim()))) : '';
            const encodedImage = userImageData ? encodeURIComponent(btoa(userImageData.split(',')[1])) : '';

            // Create link
            const baseUrl = window.location.origin + window.location.pathname;
            let link = `${baseUrl}?name=${encodedName}`;
            if (encodedSender) link += `&from=${encodedSender}`;
            if (encodedWish) link += `&wish=${encodedWish}`;
            if (encodedImage) link += `&img=${encodedImage}`;

            resultLink.textContent = link;
            resultSection.classList.add('show');
        }

        // Copy link to clipboard
        function copyLink() {
            const link = document.getElementById('resultLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = 'Copy Link';
                }, 2500);
            });
        }

        // Show animation view
        function showAnimation(name, wish, img, from) {
            // Hide creator, show animation
            document.getElementById('creatorView').style.display = 'none';
            const animationView = document.getElementById('animationView');
            animationView.classList.add('active');

            // Decode and display name
            const decodedName = decodeURIComponent(atob(decodeURIComponent(name)));
            document.getElementById('displayName').textContent = decodedName;

            // Decode and display sender
            let senderText = '';
            if (from) {
                const decodedSender = decodeURIComponent(atob(decodeURIComponent(from)));
                senderText = `— From ${decodedSender}`;
            }

            // Decode and display wish
            if (wish) {
                const decodedWish = decodeURIComponent(atob(decodeURIComponent(wish)));
                let fullMessage = decodedWish;
                if (senderText) {
                    fullMessage += `<br><br><span style="font-size: clamp(12px, 2.5vw, 16px); opacity: 0.6;">${senderText}</span>`;
                }
                document.getElementById('displayWish').innerHTML = fullMessage;
            } else if (senderText) {
                document.getElementById('displayWish').innerHTML = `<span style="font-size: clamp(12px, 2.5vw, 16px); opacity: 0.6;">${senderText}</span>`;
            }

            // Decode and display image
            if (img) {
                const decodedImage = 'data:image/jpeg;base64,' + decodeURIComponent(atob(decodeURIComponent(img)));
                document.getElementById('displayImage').src = decodedImage;
                document.getElementById('userImageDisplay').style.display = 'block';
            } else {
                document.getElementById('userImageDisplay').style.display = 'none';
            }

            // Start celebrations
            createConfetti();
            createSparkles();
            animateCanvas();
        }

        // Create confetti explosion
        function createConfetti() {
            const colors = ['#D4AF37', '#F4D03F', '#E8B4B8', '#6B1A4A', '#F7E7CE', '#E85A4F'];
            
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.width = (4 + Math.random() * 10) + 'px';
                    confetti.style.height = (4 + Math.random() * 10) + 'px';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    confetti.style.animationDuration = (2.5 + Math.random() * 3.5) + 's';
                    document.getElementById('animationView').appendChild(confetti);

                    setTimeout(() => confetti.remove(), 6000);
                }, i * 25);
            }
        }

        // Create sparkle effects
        function createSparkles() {
            const sparkle = () => {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.animationDuration = (0.8 + Math.random() * 1.2) + 's';
                setTimeout(() => s.remove(), 2000);

                document.getElementById('animationView').appendChild(s);

                if (document.getElementById('animationView').classList.contains('active')) {
                    setTimeout(sparkle, 80 + Math.random() * 180);
                }
            };

            // Create multiple sparkles initially
            for (let i = 0; i < 25; i++) {
                setTimeout(sparkle, i * 80);
            }
        }

        // Canvas animation for particles
        function animateCanvas() {
            const canvas = document.getElementById('celebrationCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];

            class Particle {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = -25;
                    this.size = Math.random() * 5 + 2;
                    this.speedY = Math.random() * 3.5 + 1;
                    this.speedX = (Math.random() - 0.5) * 2.5;
                    this.color = Math.random() > 0.5 ? '#D4AF37' : '#F4D03F';
                    this.opacity = 1;
                    this.rotation = Math.random() * 360;
                    this.rotationSpeed = (Math.random() - 0.5) * 12;
                }

                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.rotation += this.rotationSpeed;
                    this.opacity -= 0.004;

                    if (this.y > canvas.height || this.opacity <= 0) {
                        this.reset();
                    }
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    
                    if (this.size > 4) {
                        // Draw star shape
                        ctx.moveTo(0, -this.size);
                        ctx.lineTo(this.size * 0.3, -this.size * 0.3);
                        ctx.lineTo(this.size, -this.size * 0.3);
                        ctx.lineTo(this.size * 0.5, this.size * 0.2);
                        ctx.lineTo(this.size * 0.7, this.size);
                        ctx.lineTo(0, this.size * 0.5);
                        ctx.lineTo(-this.size * 0.7, this.size);
                        ctx.lineTo(-this.size * 0.5, this.size * 0.2);
                        ctx.lineTo(-this.size, -this.size * 0.3);
                        ctx.lineTo(-this.size * 0.3, -this.size * 0.3);
                    } else {
                        // Draw circle
                        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
            }

            // Create particles
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
                particles[i].y = Math.random() * canvas.height;
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }

            animate();
        }

        // Handle window resize for canvas
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('celebrationCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
